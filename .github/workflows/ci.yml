name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint --if-present

      - name: Test Unit
        run: npm run test
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_BASE_URL: ${{ secrets.NEWSAPI_BASE_URL }}
          COINGECKO_BASE: ${{ secrets.COINGECKO_BASE }}
          COINGECKO_VS_CURRENCY: ${{ secrets.COINGECKO_VS_CURRENCY }}
          RAPID_NEWS_HOST: ${{ secrets.RAPID_NEWS_HOST }}
          RAPID_NEWS_KEY: ${{ secrets.RAPID_NEWS_KEY }}

      - name: Test E2E
        run: npm run test:e2e
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_BASE_URL: ${{ secrets.NEWSAPI_BASE_URL }}
          COINGECKO_BASE: ${{ secrets.COINGECKO_BASE }}
          COINGECKO_VS_CURRENCY: ${{ secrets.COINGECKO_VS_CURRENCY }}
          RAPID_NEWS_HOST: ${{ secrets.RAPID_NEWS_HOST }}
          RAPID_NEWS_KEY: ${{ secrets.RAPID_NEWS_KEY }}
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_BASE_URL: ${{ secrets.NEWSAPI_BASE_URL }}
          COINGECKO_BASE: ${{ secrets.COINGECKO_BASE }}
          COINGECKO_VS_CURRENCY: ${{ secrets.COINGECKO_VS_CURRENCY }}
          RAPID_NEWS_HOST: ${{ secrets.RAPID_NEWS_HOST }}
          RAPID_NEWS_KEY: ${{ secrets.RAPID_NEWS_KEY }}

      - name: Lighthouse Audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:5173/
            http://localhost:5173/market
            http://localhost:5173/news
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
