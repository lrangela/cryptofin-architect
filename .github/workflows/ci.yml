name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Job para validar el estilo y calidad (Rápido)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present

  # 2. Job para Tests Unitarios (Paralelo)
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
      - run: npm ci
      - name: Run Vitest
        run: npm run test
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_BASE_URL: ${{ secrets.NEWSAPI_BASE_URL }}
          COINGECKO_BASE: ${{ secrets.COINGECKO_BASE }}
          COINGECKO_VS_CURRENCY: ${{ secrets.COINGECKO_VS_CURRENCY }}
          RAPID_NEWS_HOST: ${{ secrets.RAPID_NEWS_HOST }}
          RAPID_NEWS_KEY: ${{ secrets.RAPID_NEWS_KEY }}

  # 3. Job para Tests E2E (Paralelo - El más pesado)
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npm run test:e2e
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_BASE_URL: ${{ secrets.NEWSAPI_BASE_URL }}
          COINGECKO_BASE: ${{ secrets.COINGECKO_BASE }}
          COINGECKO_VS_CURRENCY: ${{ secrets.COINGECKO_VS_CURRENCY }}
          RAPID_NEWS_HOST: ${{ secrets.RAPID_NEWS_HOST }}
          RAPID_NEWS_KEY: ${{ secrets.RAPID_NEWS_KEY }}
          CI: true
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # 4. Job de Build Final (Solo si los anteriores pasan)
  build:
    needs: [lint, test-unit, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
      - run: npm ci
      - name: Build App
        run: npm run build
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_BASE_URL: ${{ secrets.NEWSAPI_BASE_URL }}
          COINGECKO_BASE: ${{ secrets.COINGECKO_BASE }}
          COINGECKO_VS_CURRENCY: ${{ secrets.COINGECKO_VS_CURRENCY }}
          RAPID_NEWS_HOST: ${{ secrets.RAPID_NEWS_HOST }}
          RAPID_NEWS_KEY: ${{ secrets.RAPID_NEWS_KEY }}
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy-pages:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.1
          cache: npm
      - run: npm ci
      - name: Build static client for GitHub Pages
        run: npm run build
        env:
          DEPLOY_TARGET: github-pages
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_BASE_URL: ${{ secrets.NEWSAPI_BASE_URL }}
          COINGECKO_BASE: ${{ secrets.COINGECKO_BASE }}
          COINGECKO_VS_CURRENCY: ${{ secrets.COINGECKO_VS_CURRENCY }}
          RAPID_NEWS_HOST: ${{ secrets.RAPID_NEWS_HOST }}
          RAPID_NEWS_KEY: ${{ secrets.RAPID_NEWS_KEY }}
      - name: Prepare SPA fallback
        run: |
          cp dist/client/index.html dist/client/404.html
          touch dist/client/.nojekyll
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
